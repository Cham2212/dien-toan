<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>DISTRIBUTED OS - CONTROL CENTER</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    
    <style>
        :root { --bg: #030303; --neon-blue: #00f2ff; --neon-green: #39ff14; --neon-purple: #a855f7; --neon-yellow: #eab308; --border: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Fira Code', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; z-index: 10; }
        .brand { color: var(--neon-blue); font-family: 'Orbitron'; font-size: 0.9rem; margin-bottom: 30px; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; }
        .nav-title { font-size: 0.6rem; color: #555; margin-bottom: 15px; letter-spacing: 2px; }
        .node-btn { width: 100%; padding: 12px; margin-bottom: 8px; background: #0a0a0a; border: 1px solid #222; color: #666; cursor: pointer; text-align: left; font-size: 0.75rem; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .node-btn:hover { border-color: var(--neon-blue); color: #fff; }
        .node-btn.active { border-left: 4px solid var(--neon-blue); background: #111; color: var(--neon-blue); }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #333; }
        .status-dot.active { background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }

        /* Main Area */
        #main { flex: 1; display: flex; flex-direction: column; }
        #top-half { height: 45%; border-bottom: 1px solid var(--border); position: relative; background: radial-gradient(circle at center, #080808 0%, #030303 100%); }
        #bottom-half { height: 55%; background: #000; display: flex; flex-direction: column; }

        /* Terminal Style Logs */
        .terminal-header { background: #0a0a0a; padding: 10px 15px; font-size: 0.7rem; color: #888; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        #console { flex: 1; padding: 15px; overflow-y: auto; font-size: 0.8rem; line-height: 1.6; color: #d1d1d1; scrollbar-width: thin; scrollbar-color: #222 #000; }
        .log-line { margin: 3px 0; display: flex; gap: 12px; font-family: 'Fira Code', monospace; }
        .time { color: #555; min-width: 85px; }
        .tag { font-weight: bold; min-width: 90px; }
        .origin { color: #777; min-width: 80px; font-style: italic; }

        /* Log Colors */
        .tag-network { color: var(--neon-purple); }
        .tag-lamport { color: var(--neon-yellow); }
        .tag-database { color: #3b82f6; }
        .tag-booking { color: var(--neon-green); text-shadow: 0 0 5px rgba(57, 255, 20, 0.3); }
        .tag-system { color: #fff; border-bottom: 1px solid #444; }

        /* Topology */
        #cy { width: 100%; height: 100%; }
        .info-box { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.85); border: 1px solid var(--neon-blue); padding: 12px; border-radius: 4px; font-size: 0.75rem; z-index: 5; box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
        .cluster-info { margin-top: auto; padding: 15px; background: #050505; border-radius: 4px; border: 1px solid #111; font-size: 0.7rem; color: var(--neon-green); }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="brand">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
        <span>CONTROL CENTER</span>
    </div>
    
    <div class="nav-title">TOPOLOGY VIEW</div>
    <button class="node-btn active" onclick="setFilter('ALL', this)"><span>[ GLOBAL VIEW ]</span></button>
    
    <button class="node-btn" th:id="'btn-' + ${serverId}" th:onclick="setFilter([[${serverId}]], this)">
        <span th:text="'> MY NODE (' + ${serverId} + ')'"></span>
        <div class="status-dot active"></div>
    </button>

    <div id="peer-list"></div>

    <div class="cluster-info">
        <p style="margin: 0 0 5px 0; color: #444;">CLUSTER STATUS</p>
        <div style="display: flex; align-items: center; gap: 8px;">
            <div class="status-dot active" style="animation: pulse 2s infinite;"></div>
            <span><span id="active-count">1</span>/5 NODES ONLINE</span>
        </div>
    </div>
</div>

<div id="main">
    <div id="top-half">
        <div class="info-box">
            NODE ID: <span th:text="${serverId}" style="color:var(--neon-blue); font-weight:bold;"></span><br>
            CLOCK: <span id="master-clock" style="color:var(--neon-blue); font-weight:bold;">0</span><br>
            STATUS: <span id="ws-status" style="color:#ff4444">OFFLINE</span>
        </div>
        <div id="cy"></div>
    </div>
    <div id="bottom-half">
        <div class="terminal-header">
            <span>> REAL-TIME LOGS - VIEWING: <span id="filter-label" style="color:var(--neon-blue)">ALL</span></span>
            <span style="color: var(--neon-blue); font-size: 0.6rem;">● DB_SYNC: OK | ● LAMPORT_SYNC: ACTIVE</span>
        </div>
        <div id="console"></div>
    </div>
</div>

<script th:inline="javascript">
/*<![CDATA[*/
    // Cú pháp an toàn để VS Code không báo lỗi
    const myId = /*[[${serverId}]]*/ 'Node-ME';
    const peerStr = /*[[${peerServers}]]*/ '';
    const peerLinks = (peerStr && peerStr !== 'null') ? peerStr.split(',').filter(s => s.trim()) : [];

    let allLogs = [];
    let currentFilter = 'ALL';
    let clocks = { [myId]: 0 };

    const cy = cytoscape({
        container: document.getElementById('cy'),
        style: [
            { selector: 'node', style: { 'background-color': '#000', 'border-color': '#00f2ff', 'border-width': 2, 'label': 'data(label)', 'color': '#fff', 'font-family': 'Fira Code', 'font-size': '10px', 'text-valign': 'bottom', 'text-margin-y': '5px' } },
            { selector: 'edge', style: { 'width': 1, 'line-color': '#222', 'target-arrow-shape': 'triangle', 'target-arrow-color': '#222', 'curve-style': 'bezier' } },
            { selector: '.active-node', style: { 'border-color': '#a855f7', 'border-width': 4, 'transition-duration': '0.3s' } }
        ]
    });

    function initNetwork() {
        // Node chính
        cy.add({ data: { id: myId, label: 'ME\n(Clock: 0)' } });
        
        // Các Node vệ tinh (Star Topology)
        peerLinks.forEach((p, i) => {
            const pId = p.trim();
            clocks[pId] = 0;
            cy.add({ data: { id: pId, label: pId + '\n(Clock: 0)' } });
            cy.add({ data: { id: 'e'+i, source: myId, target: pId } });
            
            const btnHtml = `
                <button class="node-btn" onclick="setFilter('${pId}', this)">
                    <span>> ${pId}</span>
                    <div id="dot-${pId}" class="status-dot"></div>
                </button>`;
            document.getElementById('peer-list').insertAdjacentHTML('beforeend', btnHtml);
        });
        
        cy.layout({ name: 'circle', radius: 100 }).run();
        document.getElementById('active-count').innerText = peerLinks.length + 1;
    }

    function addLog(type, message, srvId, clock) {
        const log = {
            time: new Date().toLocaleTimeString('en-GB'),
            type: type.toUpperCase(),
            message: message,
            serverId: srvId || myId,
            clock: clock || 0
        };
        allLogs.push(log);
        if (currentFilter === 'ALL' || log.serverId === currentFilter) appendToUI(log);
        
        // Cập nhật Clock trực quan
        if (log.clock > 0) {
            clocks[log.serverId] = log.clock;
            cy.nodes('[id="' + log.serverId + '"]').data('label', log.serverId + '\n(Clock: ' + log.clock + ')');
            if (log.serverId === myId) document.getElementById('master-clock').innerText = log.clock;
        }
    }

    function appendToUI(log) {
        const consoleEl = document.getElementById('console');
        const line = `
            <div class="log-line">
                <span class="time">[${log.time}]</span>
                <span class="tag tag-${log.type.toLowerCase()}">[${log.type}]</span>
                <span class="origin">@${log.serverId}</span>
                <span class="msg">${log.message}</span>
            </div>`;
        consoleEl.insertAdjacentHTML('beforeend', line);
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    function setFilter(val, btn) {
        currentFilter = val;
        document.querySelectorAll('.node-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('filter-label').innerText = val;
        document.getElementById('console').innerHTML = '';
        allLogs.filter(l => val === 'ALL' || l.serverId === val).forEach(appendToUI);
    }

    function connect() {
        const socket = new SockJS('/ws-log');
        const stomp = Stomp.over(socket);
        stomp.debug = null;
        stomp.connect({}, () => {
            document.getElementById('ws-status').innerText = 'ONLINE';
            document.getElementById('ws-status').style.color = 'var(--neon-green)';
            addLog('SYSTEM', 'Hệ thống đã sẵn sàng kết nối.', myId);
            
            stomp.subscribe('/topic/logs/' + myId, (res) => {
                const data = JSON.parse(res.body);
                const dot = document.getElementById('dot-' + data.serverId);
                if (dot) dot.classList.add('active');

                // CHUỖI LOG CHI TIẾT (Simulated Workflow)
                addLog('NETWORK', `Nhận yêu cầu đặt vé [${data.flightId}]`, data.serverId, data.lamportClock);
                
                setTimeout(() => {
                    addLog('LAMPORT', `Đồng bộ Clock (L_max + 1)`, data.serverId, data.lamportClock);
                }, 250);

                setTimeout(() => {
                    addLog('DATABASE', `Ghi transaction vào MongoDB Cluster0`, data.serverId, data.lamportClock);
                }, 500);

                setTimeout(() => {
                    addLog('BOOKING', `XÁC NHẬN: Khách [${data.userId}] đặt thành công vé ${data.flightId}`, data.serverId, data.lamportClock);
                    // Hiệu ứng nháy tím cho Node
                    const node = cy.nodes('[id="' + data.serverId + '"]');
                    node.addClass('active-node');
                    setTimeout(() => node.removeClass('active-node'), 1000);
                }, 750);
            });
        });
    }

    window.onload = () => { initNetwork(); connect(); };
/*]]>*/
</script>

<style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</body>
</html>
